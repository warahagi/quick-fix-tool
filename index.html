<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Fix & Snippets</title>
  <style>
    /* CSS Variables for Theming */
    :root {
      /* Light Mode */
      --bg-color: #f3f4f6;
      --text-color: #1f2937;
      --text-muted: #6b7280;
      --card-bg: #ffffff;
      --border-color: #e5e7eb;
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      --success-color: #10b981;
      --header-bg: #ffffff;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --radius: 0.5rem;
    }

    /* Dark Mode Support */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #111827;
        --text-color: #f9fafb;
        --text-muted: #9ca3af;
        --card-bg: #1f2937;
        --border-color: #374151;
        --primary-color: #3b82f6;
        --primary-hover: #60a5fa;
        --header-bg: #1f2937;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden; /* Prevent body scroll, use content scroll */
    }

    /* Header & Search */
    .header {
      background-color: var(--header-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem;
      z-index: 10;
      box-shadow: var(--shadow-sm);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .header h1 {
      font-size: 1.125rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0;
    }

    .study-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.75rem;
      background-color: var(--primary-color);
      color: white;
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      border-radius: var(--radius);
      transition: background-color 0.2s;
    }

    .study-link:hover {
      background-color: var(--primary-hover);
    }

    .search-container {
      position: relative;
      margin-top: 0.25rem;
    }

    .search-input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      border: 2px solid var(--border-color);
      border-radius: 1rem;
      background-color: var(--card-bg);
      color: var(--text-color);
      font-size: 1rem;
      font-weight: 500;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-sm);
    }

    .search-input:focus {
      border-color: var(--primary-color);
      background-color: var(--card-bg);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 0 0 4px rgba(59, 130, 246, 0.1);
      transform: translateY(-1px);
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 1.25rem;
      height: 1.25rem;
      pointer-events: none;
      transition: color 0.3s;
    }

    .search-input:focus + .search-icon {
      color: var(--primary-color);
    }

    .search-hint {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.7rem;
      color: var(--text-muted);
      padding: 0.2rem 0.4rem;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      pointer-events: none;
      display: none; /* Hidden on small screens, shown in media query if needed */
    }

    @media (min-width: 640px) {
      .search-hint {
        display: block;
      }
    }

    /* Tabs */
    .tabs-container {
      background-color: var(--header-bg);
      border-bottom: 1px solid var(--border-color);
    }

    .tabs {
      display: flex;
      overflow-x: auto;
      padding: 0 1rem;
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
    
    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      padding: 0.75rem 0.5rem;
      margin-right: 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .tab:hover {
      color: var(--text-color);
    }

    .tab.active {
      color: var(--primary-color);
      border-bottom-color: var(--primary-color);
    }

    /* Content Area */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .snippet-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Snippet Card */
    .snippet-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s;
    }
    
    .snippet-card:hover {
      box-shadow: var(--shadow-md);
    }

    .snippet-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
      gap: 0.5rem;
    }

    .snippet-title {
      font-weight: 600;
      font-size: 0.95rem;
      word-break: break-all;
    }

    .snippet-category {
      font-size: 0.7rem;
      background-color: var(--bg-color);
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      color: var(--text-muted);
      border: 1px solid var(--border-color);
      white-space: nowrap;
    }

    .snippet-content-wrapper {
      position: relative;
    }

    .snippet-content {
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 0.75rem;
      padding-right: 2.5rem; /* Space for absolute button */
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    /* Copy Button */
    .copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      border-radius: 0.375rem;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      opacity: 0.7; /* visible by default for touch devices, more opaque on hover */
    }

    @media (hover: hover) {
      .copy-btn {
        opacity: 0;
      }
      .snippet-card:hover .copy-btn {
        opacity: 1;
      }
    }

    .copy-btn:hover {
      background-color: var(--bg-color);
      color: var(--primary-color);
      border-color: var(--primary-color);
    }

    .copy-btn.copied {
      background-color: var(--success-color);
      color: white;
      border-color: var(--success-color);
      opacity: 1;
    }

    .copy-icon {
      width: 1rem;
      height: 1rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    /* External Links */
    .external-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      background-color: var(--bg-color);
      padding: 1rem;
      border-radius: var(--radius);
      border: 1px dashed var(--border-color);
    }
    
    .external-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.75rem;
      background-color: var(--card-bg);
      color: var(--primary-color);
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      transition: all 0.2s;
    }

    .external-link-btn:hover {
      background-color: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
    }
    
    .external-link-btn svg {
      width: 0.875rem;
      height: 0.875rem;
    }

    /* Modal & FAB */
    .fab {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 50%;
      background-color: var(--primary-color);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-md);
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      z-index: 40;
    }

    .fab:hover {
      background-color: var(--primary-hover);
      transform: scale(1.05);
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background-color: var(--card-bg);
      border-radius: var(--radius);
      width: 90%;
      max-width: 500px;
      padding: 1.5rem;
      box-shadow: var(--shadow-md);
      transform: translateY(1rem);
      transition: transform 0.2s;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-overlay.active .modal-content {
      transform: translateY(0);
    }

    /* Toast Notification */
    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }

    .toast {
      background-color: var(--text-color);
      color: var(--bg-color);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: var(--shadow-md);
      animation: toastIn 0.2s ease-out forwards, toastOut 0.3s ease-in forwards 2s;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(1rem); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* SVGs */
    svg {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <h1>
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        QuickSnippets
      </h1>
      <a href="flashcard.html" class="study-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        学習モード
      </a>
    </div>
    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="タイトルや内容から検索...">
      <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <div class="search-hint">Search</div>
    </div>
  </div>

  <div class="tabs-container">
    <div class="tabs" id="tabsList">
      <!-- Tabs will be rendered here -->
    </div>
  </div>

  <div class="content">
    <div class="snippet-list" id="snippetList">
      <!-- Snippets will be rendered here -->
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- FAB -->
  <button class="fab" id="addBtn" title="スニペットを追加する">
    <svg width="24" height="24" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </button>

  <!-- Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <div style="font-size:1.1rem; font-weight:600;">新規追加</div>
        <button id="closeModalBtn" style="background:none; border:none; cursor:pointer; color:var(--text-muted);"><svg width="20" height="20" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
      </div>
      <form id="addForm">
        <div style="margin-bottom: 1rem;">
          <label style="display:block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.3rem;">カテゴリ</label>
          <input type="text" id="inputCategory" class="search-input" required placeholder="例: IT用語集" list="categoryOptions">
          <datalist id="categoryOptions"></datalist>
        </div>
        <div style="margin-bottom: 1rem;">
          <label style="display:block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.3rem;">タイトル</label>
          <input type="text" id="inputTitle" class="search-input" required placeholder="例: 非同期処理">
        </div>
        <div style="margin-bottom: 1rem;">
          <label style="display:block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.3rem;">内容</label>
          <textarea id="inputContent" class="search-input" required placeholder="コードや説明を入力..." style="resize:vertical; min-height:100px; font-family:monospace; padding:0.5rem;"></textarea>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:0.5rem; margin-top:1.5rem;">
          <button type="button" id="cancelModalBtn" style="padding:0.5rem 1rem; border-radius:var(--radius); border:1px solid var(--border-color); background:var(--bg-color); color:var(--text-color); cursor:pointer;">キャンセル</button>
          <button type="submit" style="padding:0.5rem 1rem; border-radius:var(--radius); border:none; background:var(--primary-color); color:white; font-weight:500; cursor:pointer;">保存してDL</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    /**
     * Data Management
     * 外部の JSON ファイル（snippets.json）からデータを取得する
     */
    let snippetsData = [];

    // SVG Icons
    const copyIconSvg = '<svg class="copy-icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
    const checkIconSvg = '<svg class="copy-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>';

    // State
    let state = {
      searchQuery: '',
      activeCategory: 'すべて'
    };

    // DOM Elements
    const searchInput = document.getElementById('searchInput');
    const tabsList = document.getElementById('tabsList');
    const snippetList = document.getElementById('snippetList');
    const toastContainer = document.getElementById('toastContainer');

    // Extract Unique Categories
    function getCategories() {
      const categories = new Set(snippetsData.map(s => s.category));
      return ['すべて', ...Array.from(categories)];
    }

    // Render Tabs
    function renderTabs() {
      const categories = getCategories();
      tabsList.innerHTML = '';
      
      categories.forEach(category => {
        const btn = document.createElement('button');
        btn.className = `tab ${state.activeCategory === category ? 'active' : ''}`;
        btn.textContent = category;
        btn.onclick = () => {
          state.activeCategory = category;
          renderTabs();    // Update active state visual
          renderSnippets(); // Update list
        };
        tabsList.appendChild(btn);
      });
    }

    // Render Snippets
    function renderSnippets() {
      const filtered = snippetsData.filter(snippet => {
        const matchCategory = state.activeCategory === 'すべて' || snippet.category === state.activeCategory;
        const query = state.searchQuery.toLowerCase();
        const matchSearch = snippet.title.toLowerCase().includes(query) || snippet.content.toLowerCase().includes(query);
        return matchCategory && matchSearch;
      });

      snippetList.innerHTML = '';

      // 外部サイト検索リンクの表示（入力がある場合のみ）
      if (state.searchQuery.trim().length > 0) {
        const query = encodeURIComponent(state.searchQuery.trim());
        const mdnUrl = `https://developer.mozilla.org/ja/search?q=${query}`;
        const ewordsUrl = `https://e-words.jp/w/${query}.html`;
        const googleUrl = `https://www.google.com/search?q=${query}+とは`;

        const externalLinksHTML = `
          <div class="external-links">
            <div style="width: 100%; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">外部サイトで詳しい解説・使用方法を検索:</div>
            <a href="${mdnUrl}" target="_blank" class="external-link-btn">
              <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
              MDN (JSコード)
            </a>
            <a href="${ewordsUrl}" target="_blank" class="external-link-btn">
              <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
              IT用語辞典
            </a>
            <a href="${googleUrl}" target="_blank" class="external-link-btn">
              <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
              Google
            </a>
          </div>
        `;
        snippetList.insertAdjacentHTML('beforeend', externalLinksHTML);
      }

      if (filtered.length === 0) {
        snippetList.insertAdjacentHTML('beforeend', `
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" style="margin: 0 auto 1rem; color: var(--text-muted); opacity: 0.5;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <p>ローカルのスニペットが見つかりません</p>
          </div>
        `);
        return;
      }

      filtered.forEach(snippet => {
        const card = document.createElement('div');
        card.className = 'snippet-card';
        
        card.innerHTML = `
          <div class="snippet-header">
            <div class="snippet-title">${escapeHTML(snippet.title)}</div>
            <div class="snippet-category">${escapeHTML(snippet.category)}</div>
          </div>
          <div class="snippet-content-wrapper">
            <div class="snippet-content">${escapeHTML(snippet.content)}</div>
            <button class="copy-btn" title="コピーする" data-id="${snippet.id}">
              ${copyIconSvg}
            </button>
          </div>
        `;

        snippetList.appendChild(card);
      });

      // Attach Event Listeners to Copy Buttons
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', handleCopy);
      });
    }

    // Handle Copy Event
    async function handleCopy(e) {
      const btn = e.currentTarget;
      const snippetId = parseInt(btn.getAttribute('data-id'), 10);
      const snippet = snippetsData.find(s => s.id === snippetId);

      if (!snippet) return;

      try {
        await navigator.clipboard.writeText(snippet.content);
        
        // Visual Feedback on Button
        btn.classList.add('copied');
        btn.innerHTML = checkIconSvg;
        
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = copyIconSvg;
        }, 2000);

        // Show Toast Notification
        showToast('コピーしました！');
      } catch (err) {
        console.error('Failed to copy text: ', err);
        showToast('コピーに失敗しました');
      }
    }

    // Show Toast Notification
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `${checkIconSvg} <span>${message}</span>`;
      
      toastContainer.appendChild(toast);

      // Remove DOM node after animation finishes (0.3s + 2s + 0.3s)
      setTimeout(() => {
        toast.remove();
      }, 2600);
    }

    // Utility: HTML Escape
    function escapeHTML(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // Event Listeners
    searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      renderSnippets();
    });

    // Modal Add Logic
    const addBtn = document.getElementById('addBtn');
    const addModal = document.getElementById('addModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const cancelModalBtn = document.getElementById('cancelModalBtn');
    const addForm = document.getElementById('addForm');
    const categoryOptions = document.getElementById('categoryOptions');

    function openModal() {
      const categories = getCategories().filter(c => c !== 'すべて');
      categoryOptions.innerHTML = categories.map(c => `<option value="${escapeHTML(c)}">`).join('');
      addModal.classList.add('active');
    }

    function closeModal() {
      addModal.classList.remove('active');
      addForm.reset();
    }

    addBtn.addEventListener('click', openModal);
    closeModalBtn.addEventListener('click', closeModal);
    cancelModalBtn.addEventListener('click', closeModal);

    addForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const category = document.getElementById('inputCategory').value.trim();
      const title = document.getElementById('inputTitle').value.trim();
      const content = document.getElementById('inputContent').value;
      if (!category || !title || !content) return;

      const newId = snippetsData.length > 0 ? Math.max(...snippetsData.map(s => s.id)) + 1 : 1;
      const newSnippet = { id: newId, category, title, content };
      const updatedData = [...snippetsData, newSnippet];

      const jsonString = JSON.stringify(updatedData, null, 2);
      const blob = new Blob([jsonString], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'snippets.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      snippetsData.push(newSnippet);
      renderTabs();
      state.activeCategory = category;
      state.searchQuery = '';
      searchInput.value = '';
      renderSnippets();
      
      showToast('snippets.jsonをダウンロードしました。');
      closeModal();
    });

    // Initialize App
    async function init() {
      try {
        const response = await fetch('snippets.json');
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        snippetsData = await response.json();
      } catch (error) {
        console.error('Failed to load snippets:', error);
        showToast('データの読み込みに失敗しました');
      }

      renderTabs();
      renderSnippets();
    }

    init();
  </script>
</body>
</html>
