<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Fix & Snippets</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <link rel="apple-touch-icon" href="icon-512.png">
  <style>
    /* CSS Variables for Theming */
    :root {
      /* Light Mode */
      --bg-color: #f3f4f6;
      --text-color: #1f2937;
      --text-muted: #6b7280;
      --card-bg: #ffffff;
      --border-color: #e5e7eb;
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      --success-color: #10b981;
      --header-bg: #ffffff;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --radius: 0.5rem;
    }

    /* Dark Mode Support */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #111827;
        --text-color: #f9fafb;
        --text-muted: #9ca3af;
        --card-bg: #1f2937;
        --border-color: #374151;
        --primary-color: #3b82f6;
        --primary-hover: #60a5fa;
        --header-bg: #1f2937;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden; /* Prevent body scroll, use content scroll */
    }

    /* Header & Search */
    .header {
      background-color: var(--header-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem;
      z-index: 10;
      box-shadow: var(--shadow-sm);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .header-actions {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex: 1;
      min-width: 200px;
    }

    .header h1 {
      font-size: 1.125rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0;
    }

    .study-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.75rem;
      background-color: var(--primary-color);
      color: white;
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      border-radius: var(--radius);
      transition: background-color 0.2s;
    }

    .study-link:hover {
      background-color: var(--primary-hover);
    }

    .search-container {
      position: relative;
      margin-top: 0.25rem;
    }

    .search-input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      border: 2px solid var(--border-color);
      border-radius: 1rem;
      background-color: var(--card-bg);
      color: var(--text-color);
      font-size: 1rem;
      font-weight: 500;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-sm);
    }

    .search-input:focus {
      border-color: var(--primary-color);
      background-color: var(--card-bg);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 0 0 4px rgba(59, 130, 246, 0.1);
      transform: translateY(-1px);
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 1.25rem;
      height: 1.25rem;
      pointer-events: none;
      transition: color 0.3s;
    }

    .search-input:focus + .search-icon {
      color: var(--primary-color);
    }

    .search-hint {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.7rem;
      color: var(--text-muted);
      padding: 0.2rem 0.4rem;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      pointer-events: none;
      display: none; /* Hidden on small screens, shown in media query if needed */
    }

    @media (min-width: 640px) {
      .search-hint {
        display: block;
      }
    }

    /* Tabs */
    .tabs-container {
      background-color: var(--header-bg);
      border-bottom: 1px solid var(--border-color);
    }

    .tabs {
      display: flex;
      overflow-x: auto;
      padding: 0 1rem;
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
    
    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      padding: 0.75rem 0.5rem;
      margin-right: 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .tab:hover {
      color: var(--text-color);
    }

    .tab.active {
      color: var(--primary-color);
      border-bottom-color: var(--primary-color);
    }

    /* Content Area */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .snippet-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Snippet Card */
    .snippet-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s;
    }
    
    .snippet-card:hover {
      box-shadow: var(--shadow-md);
    }

    .snippet-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
      gap: 0.5rem;
    }

    .snippet-title {
      font-weight: 600;
      font-size: 0.95rem;
      word-break: break-all;
    }

    .snippet-category {
      font-size: 0.7rem;
      background-color: var(--bg-color);
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      color: var(--text-muted);
      border: 1px solid var(--border-color);
      white-space: nowrap;
    }

    .snippet-content-wrapper {
      position: relative;
    }

    .snippet-content {
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 0.75rem;
      padding-right: 2.5rem; /* Space for absolute button */
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    /* Copy Button */
    .copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      border-radius: 0.375rem;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      opacity: 0.7; /* visible by default for touch devices, more opaque on hover */
    }

    @media (max-width: 600px) {
      .copy-btn {
        width: 2.75rem;
        height: 2.75rem;
      }
    }

    @media (hover: hover) {
      .copy-btn {
        opacity: 0;
      }
      .snippet-card:hover .copy-btn {
        opacity: 1;
      }
    }

    .copy-btn:hover {
      background-color: var(--bg-color);
      color: var(--primary-color);
      border-color: var(--primary-color);
    }

    .copy-btn.copied {
      background-color: var(--success-color);
      color: white;
      border-color: var(--success-color);
      opacity: 1;
    }

    .copy-icon, .edit-icon {
      width: 1rem;
      height: 1rem;
    }

    .edit-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 2px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .edit-btn:hover {
      color: var(--primary-color);
      background-color: var(--bg-color);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    /* External Links */
    .external-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      background-color: var(--bg-color);
      padding: 1rem;
      border-radius: var(--radius);
      border: 1px dashed var(--border-color);
    }
    
    .external-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.75rem;
      background-color: var(--card-bg);
      color: var(--primary-color);
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      transition: all 0.2s;
    }

    .external-link-btn:hover {
      background-color: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
    }
    
    .external-link-btn svg {
      width: 0.875rem;
      height: 0.875rem;
    }

    /* Modal & FAB */
    .fab {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 50%;
      background-color: var(--primary-color);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-md);
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      z-index: 40;
    }

    .fab:hover {
      background-color: var(--primary-hover);
      transform: scale(1.05);
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background-color: var(--card-bg);
      border-radius: var(--radius);
      width: 90%;
      max-width: 500px;
      padding: 1.5rem;
      box-shadow: var(--shadow-md);
      transform: translateY(1rem);
      transition: transform 0.2s;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-overlay.active .modal-content {
      transform: translateY(0);
    }

    /* Toast Notification */
    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }

    .toast {
      background-color: var(--text-color);
      color: var(--bg-color);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: var(--shadow-md);
      animation: toastIn 0.2s ease-out forwards, toastOut 0.3s ease-in forwards 2s;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(1rem); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* Tags */
    .tag-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-top: 0.5rem;
    }
    .tag-chip {
      font-size: 0.65rem;
      background-color: var(--primary-color);
      color: white;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      opacity: 0.8;
    }

    /* Statistics Chart */
    .stats-bar-container {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .stats-row {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .stats-label {
      font-size: 0.8rem;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
    }
    .stats-bar-bg {
      background: var(--bg-color);
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
    }
    .stats-bar-fill {
      background: var(--primary-color);
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s ease-out;
    }

    /* SVGs */
    svg {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <h1>
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        QuickSnippets
      </h1>
      <div class="header-actions">
        <button id="statsBtn" class="study-link" style="background-color: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color);" title="統計を表示">
          <svg width="16" height="16" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        </button>
        <button id="backupBtn" class="study-link" style="background-color: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color);" title="日付入りバックアップを作成">
          <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </button>
        <button id="importCsvBtn" class="study-link" style="background-color: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color);" title="CSVからインポート">
          <svg width="16" height="16" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        </button>
        <button id="exportCsvBtn" class="study-link" style="background-color: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color);" title="CSVでエクスポート">
          <svg width="16" height="16" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </button>
        <input type="file" id="csvFileInput" accept=".csv" style="display: none;">
        <button id="linkFileBtn" class="study-link" style="background-color: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color);" title="ローカルのsnippets.jsonと直接連携します">
          <svg width="16" height="16" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
          <span id="linkFileStatus" class="hide-mobile">連携</span>
        </button>
        <a href="flashcard.html" class="study-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
          <span class="hide-mobile">学習モード</span>
        </a>
      </div>
    </div>
    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="タイトルや内容から検索...">
      <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <div class="search-hint">Search</div>
    </div>
  </div>

  <div class="tabs-container">
    <div class="tabs" id="tabsList">
      <!-- Tabs will be rendered here -->
    </div>
  </div>

  <div class="content">
    <div class="snippet-list" id="snippetList">
      <!-- Snippets will be rendered here -->
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- FAB -->
  <button class="fab" id="addBtn" title="スニペットを追加する">
    <svg width="24" height="24" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </button>

  <!-- Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <div style="font-size:1.1rem; font-weight:600;">新規追加</div>
        <button id="closeModalBtn" style="background:none; border:none; cursor:pointer; color:var(--text-muted);"><svg width="20" height="20" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
      </div>
      <form id="addForm">
        <div style="margin-bottom: 1rem;">
          <label style="display:block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.3rem;">カテゴリ</label>
          <input type="text" id="inputCategory" class="search-input" required placeholder="例: IT用語集" list="categoryOptions">
          <datalist id="categoryOptions"></datalist>
        </div>
        <div style="margin-bottom: 1rem;">
          <label style="display:block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.3rem;">タイトル</label>
          <input type="text" id="inputTitle" class="search-input" required placeholder="例: 非同期処理">
        </div>
        <div style="margin-bottom: 1rem;">
          <label style="display:block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.3rem;">内容</label>
          <textarea id="inputContent" class="search-input" required placeholder="コードや説明を入力..." style="resize:vertical; min-height:100px; font-family:monospace; padding:0.5rem;"></textarea>
        </div>
        <div style="margin-bottom: 1rem;">
          <label style="display:block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.3rem;">タグ（カンマ区切りで複数可能）</label>
          <input type="text" id="inputTags" class="search-input" placeholder="例: 重要, あとで見る">
        </div>
        <div style="display:flex; justify-content:flex-end; gap:0.5rem; margin-top:1.5rem;">
          <button type="button" id="cancelModalBtn" style="padding:0.5rem 1rem; border-radius:var(--radius); border:1px solid var(--border-color); background:var(--bg-color); color:var(--text-color); cursor:pointer;">キャンセル</button>
          <button type="submit" style="padding:0.5rem 1rem; border-radius:var(--radius); border:none; background:var(--primary-color); color:white; font-weight:500; cursor:pointer;">保存してDL</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <div style="font-size:1.1rem; font-weight:600;">スニペットの編集</div>
        <button id="closeEditModalBtn" style="background:none; border:none; cursor:pointer; color:var(--text-muted);"><svg width="20" height="20" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
      </div>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div style="margin-bottom: 1rem;">
          <label style="display:block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.3rem;">カテゴリ（ここを変更して移動）</label>
          <input type="text" id="editCategory" class="search-input" required placeholder="例: IT用語集" list="categoryOptions">
        </div>
        <div style="margin-bottom: 1rem;">
          <label style="display:block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.3rem;">タイトル</label>
          <input type="text" id="editTitle" class="search-input" required>
        </div>
        <div style="margin-bottom: 1rem;">
          <label style="display:block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.3rem;">内容</label>
          <textarea id="editContent" class="search-input" required style="resize:vertical; min-height:100px; font-family:monospace; padding:0.5rem;"></textarea>
        </div>
        <div style="margin-bottom: 1rem;">
          <label style="display:block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.3rem;">タグ（カンマ区切り）</label>
          <input type="text" id="editTags" class="search-input" placeholder="例: 重要, 復習">
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:1.5rem;">
          <button type="button" id="deleteBtn" style="padding:0.5rem 1rem; border-radius:var(--radius); border:1px solid #ef4444; background:none; color:#ef4444; cursor:pointer;">削除</button>
          <div style="display:flex; gap:0.5rem;">
            <button type="button" id="cancelEditModalBtn" style="padding:0.5rem 1rem; border-radius:var(--radius); border:1px solid var(--border-color); background:var(--bg-color); color:var(--text-color); cursor:pointer;">キャンセル</button>
            <button type="submit" style="padding:0.5rem 1rem; border-radius:var(--radius); border:none; background:var(--primary-color); color:white; font-weight:500; cursor:pointer;">更新して保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Stats Modal -->
  <div class="modal-overlay" id="statsModal">
    <div class="modal-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <div style="font-size:1.1rem; font-weight:600;">登録状況の統計</div>
        <button id="closeStatsModalBtn" style="background:none; border:none; cursor:pointer; color:var(--text-muted);"><svg width="20" height="20" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
      </div>
      <div id="statsPlaceholder"></div>
      <div style="display:flex; justify-content:center; margin-top:1.5rem;">
        <button id="closeStatsModalBtn2" style="padding:0.5rem 1.5rem; border-radius:var(--radius); border:none; background:var(--primary-color); color:white; font-weight:500; cursor:pointer;">閉じる</button>
      </div>
    </div>
  </div>

  <style>
    @media (max-width: 600px) {
      .hide-mobile { display: none; }
      .header-top { justify-content: center; }
      .header-actions { justify-content: center; width: 100%; }
      .study-link { padding: 0.4rem 0.6rem; }
    }
  </style>

  <script>
    /**
     * Data Management
     * 外部の JSON ファイル（snippets.json）からデータを取得する
     */
    let snippetsData = [];

    // SVG Icons
    const copyIconSvg = '<svg class="copy-icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
    const editIconSvg = '<svg class="edit-icon" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>';
    const checkIconSvg = '<svg class="copy-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>';
    const trashIconSvg = '<svg class="copy-icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>';

    // State
    let state = {
      searchQuery: '',
      activeCategory: 'すべて',
      fileHandle: null // For File System Access API
    };

    // DOM Elements
    const searchInput = document.getElementById('searchInput');
    const tabsList = document.getElementById('tabsList');
    const snippetList = document.getElementById('snippetList');
    const toastContainer = document.getElementById('toastContainer');

    // Extract Unique Categories
    function getCategories() {
      const categories = new Set(snippetsData.map(s => s.category));
      return ['すべて', ...Array.from(categories)];
    }

    // Render Tabs
    function renderTabs() {
      const categories = getCategories();
      tabsList.innerHTML = '';
      
      categories.forEach(category => {
        const btn = document.createElement('button');
        btn.className = `tab ${state.activeCategory === category ? 'active' : ''}`;
        btn.textContent = category;
        btn.onclick = () => {
          state.activeCategory = category;
          renderTabs();    // Update active state visual
          renderSnippets(); // Update list
        };
        tabsList.appendChild(btn);
      });
    }

    // Render Snippets
    function renderSnippets() {
      const filtered = snippetsData.filter(snippet => {
        const matchCategory = state.activeCategory === 'すべて' || snippet.category === state.activeCategory;
        const query = state.searchQuery.toLowerCase();
        const matchSearch = snippet.title.toLowerCase().includes(query) || snippet.content.toLowerCase().includes(query);
        return matchCategory && matchSearch;
      });

      snippetList.innerHTML = '';

      // 外部サイト検索リンクの表示（入力がある場合のみ）
      if (state.searchQuery.trim().length > 0) {
        const query = encodeURIComponent(state.searchQuery.trim());
        const mdnUrl = `https://developer.mozilla.org/ja/search?q=${query}`;
        const ewordsUrl = `https://e-words.jp/w/${query}.html`;
        const googleUrl = `https://www.google.com/search?q=${query}+とは`;

        const externalLinksHTML = `
          <div class="external-links">
            <div style="width: 100%; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">外部サイトで詳しい解説・使用方法を検索:</div>
            <a href="${mdnUrl}" target="_blank" class="external-link-btn">
              <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
              MDN (JSコード)
            </a>
            <a href="${ewordsUrl}" target="_blank" class="external-link-btn">
              <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
              IT用語辞典
            </a>
            <a href="${googleUrl}" target="_blank" class="external-link-btn">
              <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
              Google
            </a>
          </div>
        `;
        snippetList.insertAdjacentHTML('beforeend', externalLinksHTML);
      }

      if (filtered.length === 0) {
        snippetList.insertAdjacentHTML('beforeend', `
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" style="margin: 0 auto 1rem; color: var(--text-muted); opacity: 0.5;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <p>ローカルのスニペットが見つかりません</p>
          </div>
        `);
        return;
      }

      filtered.forEach(snippet => {
        const card = document.createElement('div');
        card.className = 'snippet-card';
        
        const tagsHTML = snippet.tags && snippet.tags.length > 0 
          ? `<div class="tag-container">${snippet.tags.map(t => `<span class="tag-chip">${escapeHTML(t)}</span>`).join('')}</div>`
          : '';

        card.innerHTML = `
          <div class="snippet-header">
            <div style="display:flex; flex-direction:column; gap:0.25rem;">
              <div class="snippet-title">${escapeHTML(snippet.title)}</div>
              <div style="display:flex; align-items:center; gap:0.5rem;">
                <div class="snippet-category">${escapeHTML(snippet.category)}</div>
                <button class="edit-btn" title="編集する" data-id="${snippet.id}">
                  ${editIconSvg}
                </button>
              </div>
              ${tagsHTML}
            </div>
          </div>
          <div class="snippet-content-wrapper">
            <div class="snippet-content">${escapeHTML(snippet.content)}</div>
            <button class="copy-btn" title="コピーする" data-id="${snippet.id}">
              ${copyIconSvg}
            </button>
          </div>
        `;

        snippetList.appendChild(card);
      });

      // Attach Event Listeners to Copy Buttons
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', handleCopy);
      });

      // Attach Event Listeners to Edit Buttons
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', handleEdit);
      });
    }

    // Handle Edit Event
    function handleEdit(e) {
      const snippetId = parseInt(e.currentTarget.getAttribute('data-id'), 10);
      const snippet = snippetsData.find(s => s.id === snippetId);
      if (!snippet) return;

      document.getElementById('editId').value = snippet.id;
      document.getElementById('editCategory').value = snippet.category;
      document.getElementById('editTitle').value = snippet.title;
      document.getElementById('editContent').value = snippet.content;
      document.getElementById('editTags').value = snippet.tags ? snippet.tags.join(', ') : '';

      const categories = getCategories().filter(c => c !== 'すべて');
      categoryOptions.innerHTML = categories.map(c => `<option value="${escapeHTML(c)}">`).join('');
      
      document.getElementById('editModal').classList.add('active');
    }

    // Handle Copy Event
    async function handleCopy(e) {
      const btn = e.currentTarget;
      const snippetId = parseInt(btn.getAttribute('data-id'), 10);
      const snippet = snippetsData.find(s => s.id === snippetId);

      if (!snippet) return;

      try {
        await navigator.clipboard.writeText(snippet.content);
        
        // Visual Feedback on Button
        btn.classList.add('copied');
        btn.innerHTML = checkIconSvg;
        
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = copyIconSvg;
        }, 2000);

        // Show Toast Notification
        showToast('コピーしました！');
      } catch (err) {
        console.error('Failed to copy text: ', err);
        showToast('コピーに失敗しました');
      }
    }

    // Show Toast Notification
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `${checkIconSvg} <span>${message}</span>`;
      
      toastContainer.appendChild(toast);

      // Remove DOM node after animation finishes (0.3s + 2s + 0.3s)
      setTimeout(() => {
        toast.remove();
      }, 2600);
    }

    // Utility: HTML Escape
    function escapeHTML(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // Event Listeners
    searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      renderSnippets();
    });

    // Modal Add Logic
    const addBtn = document.getElementById('addBtn');
    const addModal = document.getElementById('addModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const cancelModalBtn = document.getElementById('cancelModalBtn');
    const addForm = document.getElementById('addForm');
    const categoryOptions = document.getElementById('categoryOptions');
    const linkFileBtn = document.getElementById('linkFileBtn');
    const linkFileStatus = document.getElementById('linkFileStatus');

    // File System Access API: Link Local File
    async function handleLinkFile() {
      try {
        const [handle] = await window.showOpenFilePicker({
          types: [{
            description: 'JSON Files',
            accept: { 'application/json': ['.json'] },
          }],
          multiple: false
        });
        
        state.fileHandle = handle;
        linkFileStatus.textContent = '連携済み';
        linkFileBtn.style.borderColor = 'var(--success-color)';
        linkFileBtn.style.color = 'var(--success-color)';
        showToast('ファイルの連携に成功しました！');
      } catch (err) {
        console.error('File link failed:', err);
        if (err.name !== 'AbortError') {
          showToast('ファイルの連携に失敗しました');
        }
      }
    }

    linkFileBtn.addEventListener('click', handleLinkFile);

    function openModal() {
      const categories = getCategories().filter(c => c !== 'すべて');
      categoryOptions.innerHTML = categories.map(c => `<option value="${escapeHTML(c)}">`).join('');
      addModal.classList.add('active');
    }

    function closeModal() {
      addModal.classList.remove('active');
      addForm.reset();
    }

    addBtn.addEventListener('click', openModal);
    closeModalBtn.addEventListener('click', closeModal);
    cancelModalBtn.addEventListener('click', closeModal);

    // Edit Modal Close
    const closeEditModalBtn = document.getElementById('closeEditModalBtn');
    const cancelEditModalBtn = document.getElementById('cancelEditModalBtn');
    const editForm = document.getElementById('editForm');
    const editModal = document.getElementById('editModal');
    const deleteBtn = document.getElementById('deleteBtn');

    function closeEditModal() {
      editModal.classList.remove('active');
    }

    closeEditModalBtn.addEventListener('click', closeEditModal);
    cancelEditModalBtn.addEventListener('click', closeEditModal);

    // Common Save Logic
    async function saveData(updatedData) {
      if (state.fileHandle) {
        try {
          const writable = await state.fileHandle.createWritable();
          await writable.write(JSON.stringify(updatedData, null, 2));
          await writable.close();
          showToast('ファイルを更新しました！');
          return true;
        } catch (err) {
          console.error('Direct write failed:', err);
          showToast('直接保存に失敗したため、DLを開始します');
        }
      }
      
      downloadAsJson(updatedData);
      showToast('ファイルをダウンロードしました。');
      return true;
    }

    // Add Form Submit
    addForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const category = document.getElementById('inputCategory').value.trim();
      const title = document.getElementById('inputTitle').value.trim();
      const content = document.getElementById('inputContent').value;
      const tagsRaw = document.getElementById('inputTags').value;
      const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t !== '') : [];
      
      if (!category || !title || !content) return;

      const newId = snippetsData.length > 0 ? Math.max(...snippetsData.map(s => s.id)) + 1 : 1;
      const newSnippet = { id: newId, category, title, content, tags };
      const updatedData = [...snippetsData, newSnippet];

      await saveData(updatedData);

      snippetsData = updatedData;
      renderTabs();
      state.activeCategory = category;
      state.searchQuery = '';
      searchInput.value = '';
      renderSnippets();
      
      closeModal();
    });

    // Edit Form Submit
    editForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = parseInt(document.getElementById('editId').value, 10);
      const category = document.getElementById('editCategory').value.trim();
      const title = document.getElementById('editTitle').value.trim();
      const content = document.getElementById('editContent').value;
      const tagsRaw = document.getElementById('editTags').value;
      const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t !== '') : [];

      const updatedData = snippetsData.map(s => 
        s.id === id ? { ...s, category, title, content, tags } : s
      );

      await saveData(updatedData);

      snippetsData = updatedData;
      renderTabs();
      renderSnippets();
      closeEditModal();
    });

    // Delete Logic
    deleteBtn.addEventListener('click', async () => {
      if (!confirm('このスニペットを削除してもよろしいですか？')) return;

      const id = parseInt(document.getElementById('editId').value, 10);
      const updatedData = snippetsData.filter(s => s.id !== id);

      await saveData(updatedData);

      snippetsData = updatedData;
      renderTabs();
      renderSnippets();
      closeEditModal();
    });

    function downloadAsJson(data) {
      const jsonString = JSON.stringify(data, null, 2);
      const blob = new Blob([jsonString], { type: 'application/json' });
      triggerDownload(blob, 'snippets.json');
    }

    // Export CSV
    const exportCsvBtn = document.getElementById('exportCsvBtn');
    exportCsvBtn.addEventListener('click', () => {
      if (snippetsData.length === 0) return;
      
      const headers = ['id', 'category', 'title', 'content', 'tags'];
      const csvRows = [headers.join(',')];

      snippetsData.forEach(s => {
        const row = [
          s.id,
          `"${s.category.replace(/"/g, '""')}"`,
          `"${s.title.replace(/"/g, '""')}"`,
          `"${s.content.replace(/"/g, '""')}"`,
          `"${(s.tags || []).join('|').replace(/"/g, '""')}"`
        ];
        csvRows.push(row.join(','));
      });

      const csvString = csvRows.join('\n');
      const blob = new Blob([csvString], { type: 'text/csv;charset=utf8;' });
      triggerDownload(blob, 'snippets_export.csv');
      showToast('CSVを書き出しました');
    });

    // Import CSV Logic
    const importCsvBtn = document.getElementById('importCsvBtn');
    const csvFileInput = document.getElementById('csvFileInput');

    importCsvBtn.addEventListener('click', () => csvFileInput.click());

    csvFileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async (event) => {
        const text = event.target.result;
        const importedData = parseCSV(text);
        
        if (importedData.length === 0) {
          showToast('CSVの読み込みに失敗しました');
          return;
        }

        // 重複を避けるための選択
        const isOverwrite = confirm(`【インポートの確認】\n\n「OK」：既存のデータをすべて消して、このファイルの内容に「上書き（置き換え）」します。\n「キャンセル」：今のリストの末尾に「追加」します。`);

        let newData;
        if (isOverwrite) {
          // 置き換え（上書き）モード
          newData = importedData.map(item => ({
            id: parseInt(item.id, 10) || 0,
            category: item.category || '未分類',
            title: item.title || '無題',
            content: item.content || '',
            tags: item.tags ? item.tags.split('|').map(t => t.trim()).filter(t => t !== '') : []
          }));
          
          // IDがない場合は自動で振る
          let nextId = Math.max(0, ...newData.map(s => s.id)) + 1;
          newData = newData.map(s => s.id === 0 ? { ...s, id: nextId++ } : s);
        } else {
          // 追加モード
          let currentMaxId = snippetsData.length > 0 ? Math.max(...snippetsData.map(s => s.id)) : 0;
          newData = [...snippetsData];

          importedData.forEach(item => {
            currentMaxId++;
            newData.push({
              id: currentMaxId,
              category: item.category || '未分類',
              title: item.title || '無題',
              content: item.content || '',
              tags: item.tags ? item.tags.split('|').map(t => t.trim()).filter(t => t !== '') : []
            });
          });
        }

        const success = await saveData(newData);
        if (success) {
          snippetsData = newData;
          renderTabs();
          renderSnippets();
          const modeMsg = isOverwrite ? '置き換えました' : '追加しました';
          showToast(`${importedData.length}件のデータを${modeMsg}`);
        }
        
        csvFileInput.value = ''; // Reset input
      };
      reader.readAsText(file);
    });

    // Basic CSV Parser (Handles quotes and multiline)
    function parseCSV(text) {
      const rows = [];
      let currentField = '';
      let currentRow = [];
      let inQuotes = false;
      
      // Normalize line endings
      const content = text.trim().replace(/\r\n/g, '\n');
      
      for (let i = 0; i < content.length; i++) {
        const char = content[i];
        const nextChar = content[i+1];

        if (inQuotes) {
          if (char === '"' && nextChar === '"') {
            currentField += '"';
            i++;
          } else if (char === '"') {
            inQuotes = false;
          } else {
            currentField += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ',') {
            currentRow.push(currentField.trim());
            currentField = '';
          } else if (char === '\n') {
            currentRow.push(currentField.trim());
            rows.push(currentRow);
            currentRow = [];
            currentField = '';
          } else {
            currentField += char;
          }
        }
      }
      
      if (currentRow.length > 0 || currentField !== '') {
        currentRow.push(currentField.trim());
        rows.push(currentRow);
      }

      if (rows.length < 2) return [];

      const headers = rows[0].map(h => h.toLowerCase());
      const data = [];
      
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (row.length < 2) continue;
        
        const obj = {};
        headers.forEach((header, index) => {
          obj[header] = row[index];
        });
        data.push(obj);
      }
      
      return data;
    }

    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Backup Logic
    const backupBtn = document.getElementById('backupBtn');
    backupBtn.addEventListener('click', () => {
      if (snippetsData.length === 0) return;
      
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const filename = `snippets_backup_${yyyy}${mm}${dd}.json`;
      
      const jsonString = JSON.stringify(snippetsData, null, 2);
      const blob = new Blob([jsonString], { type: 'application/json' });
      triggerDownload(blob, filename);
      showToast('バックアップを作成しました');
    });

    // Statistics Modal Logic
    const statsBtn = document.getElementById('statsBtn');
    const statsModal = document.getElementById('statsModal');
    const closeStatsModalBtn = document.getElementById('closeStatsModalBtn');
    const closeStatsModalBtn2 = document.getElementById('closeStatsModalBtn2');
    const statsPlaceholder = document.getElementById('statsPlaceholder');

    statsBtn.addEventListener('click', () => {
      const categories = [...new Set(snippetsData.map(s => s.category))];
      const counts = categories.map(cat => ({
        name: cat,
        count: snippetsData.filter(s => s.category === cat).length
      })).sort((a, b) => b.count - a.count);

      const maxCount = Math.max(...counts.map(c => c.count));

      let statsHTML = '<div class="stats-bar-container">';
      counts.forEach(c => {
        const percentage = (c.count / maxCount) * 100;
        statsHTML += `
          <div class="stats-row">
            <div class="stats-label">
              <span>${escapeHTML(c.name)}</span>
              <span style="color:var(--primary-color); font-weight:bold;">${c.count} 件</span>
            </div>
            <div class="stats-bar-bg"><div class="stats-bar-fill" style="width: ${percentage}%"></div></div>
          </div>
        `;
      });
      statsHTML += '</div>';
      
      statsPlaceholder.innerHTML = statsHTML;
      statsModal.classList.add('active');
    });

    closeStatsModalBtn.addEventListener('click', () => statsModal.classList.remove('active'));
    closeStatsModalBtn2.addEventListener('click', () => statsModal.classList.remove('active'));

    // Initialize App
    async function init() {
      try {
        const response = await fetch('snippets.json');
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        snippetsData = await response.json();
      } catch (error) {
        console.error('Failed to load snippets:', error);
        showToast('データの読み込みに失敗しました');
      }

      renderTabs();
      renderSnippets();
    }

    init();

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered', reg))
          .catch(err => console.error('SW registration failed', err));
      });
    }
  </script>
</body>
</html>
