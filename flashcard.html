<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickSnippets - 学習モード</title>
  <style>
    /* Same Design Tokens as index.html */
    :root {
      --bg-color: #f3f4f6;
      --text-color: #1f2937;
      --text-muted: #6b7280;
      --card-bg: #ffffff;
      --border-color: #e5e7eb;
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --radius: 0.75rem;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #111827;
        --text-color: #f9fafb;
        --text-muted: #9ca3af;
        --card-bg: #1f2937;
        --border-color: #374151;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .nav-header {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: var(--primary-color);
    }

    .controls {
      width: 100%;
      max-width: 600px;
      background: var(--card-bg);
      padding: 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select, .toggle-container {
      width: 100%;
      padding: 0.5rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border-color);
      background: var(--bg-color);
      color: var(--text-color);
      font-size: 0.9rem;
      outline: none;
    }

    /* Flashcard Styles */
    .flashcard-container {
      perspective: 1000px;
      width: 100%;
      max-width: 500px;
      height: 350px;
      cursor: pointer;
      margin-bottom: 2rem;
    }

    .flashcard {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .flashcard.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      background-color: var(--card-bg);
      box-shadow: var(--shadow-md);
    }

    .card-back {
      transform: rotateY(180deg);
      background-color: var(--bg-color);
    }

    .card-label {
      position: absolute;
      top: 1rem;
      left: 1rem;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--bg-color);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }

    .card-content {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.4;
      word-break: break-all;
      white-space: pre-wrap;
      overflow-y: auto;
      max-height: 80%;
    }

    .card-hint {
      position: absolute;
      bottom: 1rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Action Buttons */
    .actions {
      display: flex;
      gap: 1rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-next {
      background-color: var(--primary-color);
      color: white;
    }

    .btn-next:hover {
      background-color: var(--primary-hover);
    }

    .btn-prev {
      background-color: var(--card-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
    }

    .btn-prev:hover {
      background-color: var(--bg-color);
    }

    .stats {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    svg {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Flip animation hint */
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }
    .flashcard-container:not(.has-interacted) {
      animation: pulse 2s infinite ease-in-out;
    }

    /* Omikuji Styles */
    .omikuji-btn {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      padding: 0 1.25rem;
      height: 3.5rem;
      border-radius: 2rem;
      background-color: #ef4444; /* Red for Omikuji */
      color: white;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4);
      cursor: pointer;
      border: 2px solid #fff;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 40;
      font-weight: 800;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .omikuji-btn:hover {
      background-color: #dc2626;
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 20px rgba(239, 68, 68, 0.5);
    }

    .omikuji-btn:active {
      transform: translateY(0) scale(0.95);
    }

    .omikuji-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 2rem;
    }

    .omikuji-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .omikuji-box {
      background: #fff;
      color: #1f2937;
      padding: 2rem;
      border-radius: 1rem;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
      border: 4px solid #ef4444;
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .omikuji-overlay.active .omikuji-box {
      transform: scale(1);
    }

    .omikuji-fortune {
      font-size: 3rem;
      font-weight: 900;
      color: #ef4444;
      margin-bottom: 1rem;
      display: block;
    }

    .omikuji-text {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .omikuji-close {
      background: #ef4444;
      color: white;
      border: none;
      padding: 0.5rem 2rem;
      border-radius: 2rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .omikuji-close:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>

  <div class="nav-header">
    <a href="index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      スニペット一覧
    </a>
    <h2 style="font-size: 1rem;">単語帳学習</h2>
  </div>

  <div class="controls">
    <div class="control-group">
      <label for="categorySelect">学習カテゴリ</label>
      <select id="categorySelect">
        <option value="すべて">すべてのカテゴリ</option>
      </select>
    </div>
    <div class="control-group">
      <label for="modeSelect">学習モード</label>
      <select id="modeSelect">
        <option value="t2c">用語 → 内容・説明</option>
        <option value="c2t">内容・説明 → 用語</option>
      </select>
    </div>
  </div>

  <div class="flashcard-container" id="cardContainer">
    <div class="flashcard" id="card">
      <div class="card-face card-front">
        <span class="card-label">お題</span>
        <div class="card-content" id="frontContent">データを読み込み中...</div>
        <div class="card-hint">クリックして答えを表示</div>
      </div>
      <div class="card-face card-back">
        <span class="card-label">答え</span>
        <div class="card-content" id="backContent">...</div>
        <div class="card-hint">クリックでお題に戻る</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-prev" id="prevBtn">
      <svg width="18" height="18" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
      前へ
    </button>
    <button class="btn btn-next" id="nextBtn">
      次へ
      <svg width="18" height="18" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
  </div>

  <div class="stats" id="statsDisplay">
    0 / 0 枚学習中
  </div>

  <!-- Omikuji FAB -->
  <button class="omikuji-btn" id="omikujiBtn" title="ビジネスおみくじを引く">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
    <span>おみくじ</span>
  </button>

  <!-- Omikuji Modal -->
  <div class="omikuji-overlay" id="omikujiOverlay">
    <div class="omikuji-box">
      <div style="font-size: 0.8rem; font-weight: 700; color: #ef4444; text-transform: uppercase; margin-bottom: 0.5rem;">Business Omikuji</div>
      <span id="omikujiFortune" class="omikuji-fortune">大吉</span>
      <p id="omikujiText" class="omikuji-text">今日のあなたは学習効率が最高潮です！新しい知識がスッと頭に入ります。</p>
      <button class="omikuji-close" id="omikujiClose">閉じる</button>
    </div>
  </div>

  <script>
    let allSnippets = [];
    let currentPool = [];
    let currentIndex = -1;
    let isFlipped = false;

    // DOM
    const card = document.getElementById('card');
    const cardContainer = document.getElementById('cardContainer');
    const frontContent = document.getElementById('frontContent');
    const backContent = document.getElementById('backContent');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const categorySelect = document.getElementById('categorySelect');
    const modeSelect = document.getElementById('modeSelect');
    const statsDisplay = document.getElementById('statsDisplay');

    async function init() {
      try {
        const response = await fetch('snippets.json');
        allSnippets = await response.json();
        
        // Populate categories
        const categories = [...new Set(allSnippets.map(s => s.category))].sort();
        categories.forEach(cat => {
          const opt = document.createElement('option');
          opt.value = cat;
          opt.textContent = cat;
          categorySelect.appendChild(opt);
        });

        updatePool();
        showNext();
      } catch (err) {
        frontContent.textContent = 'データの読み込みに失敗しました。snippets.jsonが正しく配置されているか確認してください。';
        console.error(err);
      }
    }

    function updatePool() {
      const selectedCat = categorySelect.value;
      if (selectedCat === 'すべて') {
        currentPool = [...allSnippets];
      } else {
        currentPool = allSnippets.filter(s => s.category === selectedCat);
      }
      
      // Shuffle pool
      for (let i = currentPool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentPool[i], currentPool[j]] = [currentPool[j], currentPool[i]];
      }
      
      currentIndex = -1;
    }

    function renderCard() {
      const snippet = currentPool[currentIndex];
      const mode = modeSelect.value;
      
      // Reset flip
      isFlipped = false;
      card.classList.remove('flipped');

      if (mode === 't2c') {
        frontContent.textContent = snippet.title;
        backContent.textContent = snippet.content;
      } else {
        frontContent.textContent = snippet.content;
        backContent.textContent = snippet.title;
      }

      statsDisplay.textContent = `${currentIndex + 1} / ${currentPool.length} 枚目（カテゴリ: ${categorySelect.value}）`;
    }

    function showNext() {
      if (currentPool.length === 0) {
        frontContent.textContent = '該当するデータがありません。';
        backContent.textContent = '';
        return;
      }
      currentIndex = (currentIndex + 1) % currentPool.length;
      renderCard();
    }

    function showPrev() {
      if (currentPool.length === 0) return;
      currentIndex = (currentIndex - 1 + currentPool.length) % currentPool.length;
      renderCard();
    }

    // Events
    cardContainer.addEventListener('click', () => {
      isFlipped = !isFlipped;
      card.classList.toggle('flipped', isFlipped);
      cardContainer.classList.add('has-interacted');
    });

    nextBtn.addEventListener('click', showNext);
    prevBtn.addEventListener('click', showPrev);

    categorySelect.addEventListener('change', () => {
      updatePool();
      showNext();
    });

    modeSelect.addEventListener('change', () => {
      // Re-render current card with new mode
      if (currentIndex >= 0 && currentIndex < currentPool.length) {
        const snippet = currentPool[currentIndex];
        const mode = modeSelect.value;
        if (mode === 't2c') {
          frontContent.textContent = snippet.title;
          backContent.textContent = snippet.content;
        } else {
          frontContent.textContent = snippet.content;
          backContent.textContent = snippet.title;
        }
      }
    });

    // Omikuji Logic
    const omikujiBtn = document.getElementById('omikujiBtn');
    const omikujiOverlay = document.getElementById('omikujiOverlay');
    const omikujiClose = document.getElementById('omikujiClose');
    const omikujiFortune = document.getElementById('omikujiFortune');
    const omikujiText = document.getElementById('omikujiText');

    const fortunes = [
      { f: '大吉', t: '全コードがバグなしで動く予感！学習効率も最高潮です。', c: '#d97706' },
      { f: '大吉', t: '革新的なロジックが閃きます。今日は難しい用語の暗記に最適。', c: '#d97706' },
      { f: '吉', t: '集中力が持続する一日。スニペットを5つ覚えると運気UP。', c: '#ef4444' },
      { f: '吉', t: '周囲からの信頼が高まります。丁寧なメール挨拶が吉。', c: '#ef4444' },
      { f: '中吉', t: '定時退社の相が出ています。業務効率化ツールを使い倒しましょう。', c: '#f59e0b' },
      { f: '中吉', t: '新しい技術への挑戦にツキがあります。JSコード集をチェック！', c: '#f59e0b' },
      { f: '小吉', t: '地道な努力が実を結ぶ日。リファクタリングを少しずつ進めて。', c: '#ef4444' },
      { f: '小吉', t: '焦らず一歩ずつ。休憩時間にIT用語を一つ覚えるのがおすすめ。', c: '#ef4444' },
      { f: '末吉', t: '可もなく不可もない穏やかな一日。基礎の復習に時間を割いて休めるなら休んで。', c: '#6b7280' },
      { f: '凶', t: 'セミコロン忘れに注意。深呼吸してからコードを見直しましょう。', c: '#4b5563' },
      { f: '大凶', t: '強制終了の相あり。保存（Save/DL）はこまめに行いましょう！', c: '#1f2937' }
    ];

    omikujiBtn.addEventListener('click', () => {
      const result = fortunes[Math.floor(Math.random() * fortunes.length)];
      omikujiFortune.textContent = result.f;
      omikujiFortune.style.color = result.c;
      omikujiText.textContent = result.t;
      omikujiOverlay.classList.add('active');
    });

    omikujiClose.addEventListener('click', () => {
      omikujiOverlay.classList.remove('active');
    });

    init();
  </script>
</body>
</html>
